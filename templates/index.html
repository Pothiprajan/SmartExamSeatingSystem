<!DOCTYPE html>
<html>
<head>
    <title>Smart Exam Seating System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
        }

        h1 {
            margin-top: 20px;
            color: #333;
        }

        .container {
            width: 85%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
        }

        /* 🔥 BUTTON ALIGNMENT FIX */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background: linear-gradient(45deg, #333, #555);
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #ffe0cc;
            transition: 0.3s;
        }

        button {
            padding: 8px 14px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .add-btn {
            background: linear-gradient(45deg, black, #444);
            color: white;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            appearance: none;
        }

        input:focus, select:focus {
            outline: none;
            border: 1px solid #fcb69f;
            box-shadow: 0 0 5px #fcb69f;
        }

        .filters {
            margin: 20px;
        }
    </style>
</head>

<body>

    <h1>Smart Exam Seating System</h1>

    <div class="container">

        <!-- 🔥 ACTION BUTTONS -->
        <div class="action-buttons">
            <a href="/add">
                <button class="add-btn">+ Add Student</button>
            </a>

            <a href="/generate" onclick="return confirm('Regenerate seating? This will change all seat assignments!')">
                <button style="background:green; color:white;">🔄 Generate Seating</button>
            </a>
        </div>

        <!-- FILTERS -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search student...">

            <select id="hallFilter">
                <option value="all">All Halls</option>
                <option value="Hall - A">Hall - A</option>
                <option value="Hall - B">Hall - B</option>
                <option value="Hall - C">Hall - C</option>
            </select>

            <button onclick="applyFilter()">Filter</button>
            <button onclick="resetFilter()">Reset</button>
        </div>

        <!-- TABLE -->
        <table>
            <thead>
                <tr>
                    <th>Hall</th>
                    <th>Seat</th>
                    <th>Name</th>
                    <th>Subject</th>
                </tr>
            </thead>

            <tbody>
                {% for student in seating %}
                <tr>
                    <td>{{ student.hall }}</td>
                    <td>{{ student.seat }}</td>
                    <td>{{ student.Name }}</td>
                    <td>{{ student.Subject }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

    <!-- SCRIPT -->
    <script>
        function applyFilter() {
            let search = document.getElementById("searchInput").value.toLowerCase();
            let hall = document.getElementById("hallFilter").value;

            let rows = document.querySelectorAll("table tbody tr");

            rows.forEach(row => {
                let name = row.cells[2].innerText.toLowerCase();
                let subject = row.cells[3].innerText.toLowerCase();
                let hallValue = row.cells[0].innerText;

                let matchSearch = name.includes(search) || subject.includes(search);
                let matchHall = (hall === "all" || hallValue === hall);

                row.style.display = (matchSearch && matchHall) ? "" : "none";
            });
        }

        function resetFilter() {
            document.getElementById("searchInput").value = "";
            document.getElementById("hallFilter").value = "all";

            let rows = document.querySelectorAll("table tbody tr");
            rows.forEach(row => row.style.display = "");
        }
    </script>

</body>
</html>
