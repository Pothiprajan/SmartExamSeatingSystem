<!DOCTYPE html>
<html>
<head>
    <title>Smart Exam Seating System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }

        th {
            background-color: #333;
            color: white;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            cursor: pointer;
        }

        input, select {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>

<body>

    <h1>Smart Exam Seating System</h1>

    <!-- Add Student Button -->
    <a href="/add">
        <button style="background:black; color:white;">+ Add Student</button>
    </a>

    <!-- FILTER SECTION -->
    <div style="margin: 20px;">
        <input type="text" id="searchInput" placeholder="Search student...">

        <select id="hallFilter">
            <option value="all">All Halls</option>
            <option value="Hall - A">Hall - A</option>
        </select>

        <button onclick="applyFilter()">Filter</button>
        <button onclick="resetFilter()">Reset</button>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Hall</th>
                <th>Seat</th>
                <th>Name</th>
                <th>Subject</th>
            </tr>
        </thead>

        <tbody>
            {% for i in range(seating|length) %}
                {% for j in range(seating[i]|length) %}
                    {% set student = seating[i][j] %}
                    {% if student %}
                    <tr>
                        <td>Hall - A</td>
                        <td>{{ i + 1 }}-{{ j + 1 }}</td>
                        <td>{{ student['Name'] }}</td>
                        <td>{{ student['Subject'] }}</td>
                    </tr>
                    {% endif %}
                {% endfor %}
            {% endfor %}
        </tbody>
    </table>

    <!-- SCRIPT -->
    <script>
        function applyFilter() {
            let search = document.getElementById("searchInput").value.toLowerCase();
            let hall = document.getElementById("hallFilter").value;

            let rows = document.querySelectorAll("table tbody tr");

            rows.forEach(row => {
                let name = row.cells[2].innerText.toLowerCase();
                let subject = row.cells[3].innerText.toLowerCase();
                let hallValue = row.cells[0].innerText;

                let matchSearch = name.includes(search) || subject.includes(search);
                let matchHall = (hall === "all" || hallValue === hall);

                if (matchSearch && matchHall) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });
        }

        function resetFilter() {
            document.getElementById("searchInput").value = "";
            document.getElementById("hallFilter").value = "all";

            let rows = document.querySelectorAll("table tbody tr");
            rows.forEach(row => row.style.display = "");
        }
    </script>

</body>
</html>
